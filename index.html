<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Lizbet 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#ff9bb3);
  overflow:hidden;
  color:#fff;
}

.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.active{ display:flex; }

h1{
  font-family:'Great Vibes',cursive;
  font-size:40px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff4d6d;
  cursor:pointer;
}

/* carta */
.envelope{
  width:280px;
  height:180px;
  background:#fff;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  color:#ff4d6d;
  font-size:20px;
}

.typing{
  font-family:'Great Vibes',cursive;
  font-size:24px;
  color:#333;
  padding:15px;
}

/* fotos */
#photo{
  width:260px;
  border-radius:15px;
  display:none;
  opacity:0;
  transform:scale(0.8);
  transition: all .6s ease;
}

#photo.show{
  opacity:1;
  transform:scale(1);
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<!-- ESCENA 1 -->
<div class="scene active" id="scene1">
  <h1>💖 Lizbet, tengo algo para ti...</h1>
  <button onclick="start()">Abrir</button>
</div>

<!-- ESCENA 2 -->
<div class="scene" id="scene2">
  <div class="envelope" onclick="showMessage()">
    💌 Toca para abrir
  </div>
</div>

<!-- ESCENA 3 -->
<div class="scene" id="scene3">
  <div class="typing" id="text"></div>
</div>

<!-- ESCENA 4 (FOTOS) -->
<div class="scene" id="scene4" onclick="nextPhoto()">
  <h1>📸 Nuestros recuerdos</h1>
  <img id="photo">
  <p>(toca la pantalla)</p>
</div>

<!-- ESCENA FINAL -->
<div class="scene" id="scene5">
  <h1 id="final"></h1>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// cambiar escena
function changeScene(n){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("scene"+n).classList.add("active");
}

// inicio
function start(){
  changeScene(2);
  document.getElementById("music").play().catch(()=>{});
}

// carta
function showMessage(){
  changeScene(3);
  typeText("Lizbet...\nDesde el 1 de mayo todo cambió.\nGracias por cada momento juntos.\nEres lo mejor que me ha pasado 💖", ()=>{
    setTimeout(()=>changeScene(4),3000);
  });
}

// efecto escritura
function typeText(text,callback){
  let i=0;
  let el=document.getElementById("text");
  el.innerHTML="";
  let interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length){
      clearInterval(interval);
      if(callback) callback();
    }
  },40);
}

// FOTOS
const photos = [
  "fot1.jpg","fot2.jpg","fot3.jpg","fot4.jpg","fot5.jpg",
  "fot6.jpg","fot7.jpg","fot8.jpg","fot9.jpg","fot10.jpg"
];

let index = 0;

function nextPhoto(){
  let img = document.getElementById("photo");

  if(index < photos.length){
    img.classList.remove("show");

    setTimeout(()=>{
      img.src = photos[index];
      img.style.display = "block";
      img.classList.add("show");
    },100);

    index++;
  } else {
    changeScene(5);
    typeFinal("💖 Por fin logramos un año 💖", showConfetti);
  }
}

// texto final
function typeFinal(text,callback){
  let i=0;
  let el=document.getElementById("final");
  let interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length){
      clearInterval(interval);
      if(callback) callback();
    }
  },60);
}

// confetti
function showConfetti(){
  const duration = 4000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({ particleCount: 6, spread: 70, origin: { y: 0.6 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

</script>

</body>
</html>
<!-- force deploy -->
