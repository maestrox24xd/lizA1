<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Lizbet 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#ffd6e0,#ff9bb3);
  overflow:hidden;
  color:#fff;
}

.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{ display:flex; }

h1{
  font-family:'Great Vibes',cursive;
  font-size:40px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff4d6d;
  cursor:pointer;
}

.envelope{
  width:280px;
  height:180px;
  background:#fff;
  border-radius:15px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
}

.typing{
  font-family:'Great Vibes',cursive;
  font-size:24px;
  color:#333;
  padding:15px;
}

.gallery img{
  width:80px;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ESCENA 1 -->
<div class="scene active" id="scene1">
  <h1>💖 Lizbet, tengo algo para ti...</h1>
  <button onclick="start()">Abrir</button>
</div>

<!-- ESCENA 2 -->
<div class="scene" id="scene2">
  <div class="envelope" onclick="showMessage()">
    💌 Toca para leer
  </div>
</div>

<!-- ESCENA 3 -->
<div class="scene" id="scene3">
  <div class="typing" id="text"></div>
</div>

<!-- ESCENA 4 -->
<div class="scene" id="scene4">
  <h1>📸 Nuestros recuerdos</h1>
  <input type="file" multiple onchange="loadImages(event)">
  <div class="gallery" id="gallery">
  <img src="foto1.jepg">
</div>
  <button onclick="showFinal()">Continuar</button>
</div>

<!-- ESCENA FINAL -->
<div class="scene" id="scene5">
  <h1 id="final"></h1>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

function changeScene(n){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("scene"+n).classList.add("active");
}

// iniciar
function start(){
  changeScene(2);
  document.getElementById("music").play().catch(()=>{});
}

// abrir carta
function showMessage(){
  changeScene(3);
  typeText("Lizbet...\nDesde el 1 de mayo todo cambió.\nDesde ese día supe que tú eras especial.\nGracias por cada momento... 💖", ()=>{
    setTimeout(()=>changeScene(4),3000);
  });
}

// escribir texto
function typeText(text,callback){
  let i=0;
  let el=document.getElementById("text");
  el.innerHTML="";
  let interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length){
      clearInterval(interval);
      if(callback) callback();
    }
  },40);
}

// galería
function loadImages(e){
  let g=document.getElementById("gallery");
  for(let f of e.target.files){
    let img=document.createElement("img");
    img.src=URL.createObjectURL(f);
    g.appendChild(img);
  }
}

// final
function showFinal(){
  changeScene(5);
  typeFinal("Lizbet 💖\nTe elegiría una y mil veces.\nFeliz 1 de mayo.");
}

function typeFinal(text){
  let i=0;
  let el=document.getElementById("final");
  let interval=setInterval(()=>{
    el.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },60);
}

</script>

</body>
</html>
<!-- force deploy -->
